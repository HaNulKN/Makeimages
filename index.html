<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지니한테 그림 부탁해봐요!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800&display=swap');
  :root {
    --sky:#6EC6F5;--sun:#FFD93D;--coral:#FF6B6B;--mint:#6BCB77;
    --purple:#C77DFF;--card-bg:#ffffff;
    --shadow:0 8px 32px rgba(110,198,245,0.18);--radius:28px;
    --font:'Nanum Round Square','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:linear-gradient(160deg,#e0f4ff 0%,#f8f0ff 100%);min-height:100vh;overflow-x:hidden;}
  .screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px 32px;}
  .screen.active{display:flex;}
  .page-title{font-size:2.8rem;font-weight:800;color:#3a3a6e;text-align:center;margin-bottom:10px;line-height:1.2;}
  .page-sub{font-size:1.5rem;color:#7a7aaa;text-align:center;margin-bottom:28px;}
  .genie-img{width:180px;animation:bounce 1.8s infinite;display:block;margin:0 auto 10px;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
  .start-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .btn-big{font-family:var(--font);font-size:1.8rem;font-weight:800;border:none;border-radius:999px;padding:24px 52px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 6px 24px rgba(0,0,0,0.10);}
  .btn-big:active{transform:scale(0.96);}
  .btn-choose{background:linear-gradient(135deg,var(--sun),#ffb830);color:#3a3a00;}
  .btn-random{background:linear-gradient(135deg,var(--coral),#ff9a4d);color:#fff;}
  .btn-choose:hover{box-shadow:0 8px 32px rgba(255,217,61,0.5);transform:translateY(-3px);}
  .btn-random:hover{box-shadow:0 8px 32px rgba(255,107,107,0.4);transform:translateY(-3px);}
  .categories{display:flex;flex-direction:column;gap:24px;width:100%;max-width:920px;}
  .category-row{background:var(--card-bg);border-radius:var(--radius);padding:24px 30px;box-shadow:var(--shadow);}
  .cat-label{font-size:1.5rem;font-weight:800;color:#3a3a6e;margin-bottom:12px;}
  .chips{display:flex;flex-wrap:wrap;gap:14px;}
  .chip{font-family:var(--font);font-size:1.5rem;font-weight:700;border:3px solid #e0e8f8;background:#f8f9ff;border-radius:999px;padding:14px 28px;cursor:pointer;transition:all .15s;color:#3a3a6e;user-select:none;}
  .chip:hover{border-color:var(--sky);background:#eaf6ff;}
  .chip.sel-animal{background:var(--sky);border-color:var(--sky);color:#fff;transform:scale(1.08);}
  .chip.sel-bg{background:var(--mint);border-color:var(--mint);color:#fff;transform:scale(1.08);}
  .chip.sel-action{background:var(--purple);border-color:var(--purple);color:#fff;transform:scale(1.08);}
  .add-row{display:flex;gap:12px;margin-top:12px;}
  .add-input{font-family:var(--font);font-size:1.3rem;border:2px solid #d0d8f0;border-radius:999px;padding:12px 24px;outline:none;flex:1;color:#3a3a6e;}
  .add-input:focus{border-color:var(--sky);}
  .add-emoji{max-width:72px;text-align:center;}
  .btn-add{font-family:var(--font);font-size:1.3rem;font-weight:800;background:var(--sky);color:#fff;border:none;border-radius:999px;padding:12px 24px;cursor:pointer;white-space:nowrap;}
  .prompt-preview{background:linear-gradient(135deg,#fff9e0,#fff3f3);border:2px dashed var(--sun);border-radius:20px;padding:18px 24px;font-size:1.8rem;font-weight:800;color:#3a3a6e;text-align:center;margin-top:24px;min-height:60px;width:100%;max-width:920px;}
  .prompt-preview span{color:var(--coral);}
  .btn-confirm{font-family:var(--font);font-size:1.9rem;font-weight:800;background:linear-gradient(135deg,var(--mint),#38b249);color:#fff;border:none;border-radius:999px;padding:24px 64px;cursor:pointer;margin-top:28px;box-shadow:0 6px 24px rgba(107,203,119,0.35);transition:transform .15s;}
  .btn-confirm:hover{transform:translateY(-3px);}
  .btn-confirm:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none;}
  .slot-machine{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin:20px 0;}
  .slot{background:var(--card-bg);border-radius:24px;box-shadow:var(--shadow);padding:30px 36px;min-width:200px;text-align:center;}
  .slot-label{font-size:1.3rem;font-weight:800;color:#9090bb;margin-bottom:10px;}
  .slot-value{font-size:2.2rem;font-weight:800;color:#3a3a6e;min-height:80px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;}
  .slot-value.spinning{color:var(--sky);animation:spin-text .08s infinite;}
  @keyframes spin-text{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
  .slot-emoji{font-size:1.9rem;}
  .btn-spin{font-family:var(--font);font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--coral),#ff9a4d);color:#fff;border:none;border-radius:999px;padding:26px 68px;cursor:pointer;box-shadow:0 6px 24px rgba(255,107,107,0.35);transition:transform .15s;}
  .btn-spin:hover{transform:scale(1.06);}
  .btn-spin:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none;}
  .result-box{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:48px 56px;max-width:700px;width:100%;text-align:center;}
  .result-prompt{font-size:2.4rem;font-weight:800;color:#3a3a6e;background:linear-gradient(135deg,#fff9e0,#fff3f3);border-radius:16px;padding:22px;margin:16px 0 20px;border:2px dashed var(--sun);}
  .action-btn{font-family:var(--font);font-size:1.5rem;font-weight:800;border:none;border-radius:999px;padding:18px 44px;cursor:pointer;margin-bottom:10px;transition:transform .15s;display:block;width:100%;text-decoration:none;text-align:center;}
  .copy-btn{background:var(--sun);color:#3a3a00;}
  .copy-btn:hover{transform:scale(1.03);}
  .gemini-btn{background:linear-gradient(135deg,#4285F4,#34A853);color:#fff;}
  .gemini-btn:hover{transform:scale(1.03);opacity:.92;}
  .copy-hint{font-size:1.3rem;color:#9090bb;margin-bottom:16px;}
  .nav-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .btn-back{font-family:var(--font);font-size:1.4rem;font-weight:800;background:#f0f0f8;color:#3a3a6e;border:none;border-radius:999px;padding:16px 36px;cursor:pointer;}
  .btn-back:hover{background:#e0e0f0;}
  .btn-home{font-family:var(--font);font-size:1.4rem;font-weight:800;background:var(--purple);color:#fff;border:none;border-radius:999px;padding:16px 36px;cursor:pointer;}
  .btn-home:hover{background:#b060f0;}
  .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
  .confetti-piece{position:absolute;width:12px;height:12px;border-radius:3px;animation:fall linear forwards;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>

      {text:'구름 위',emoji:'☁️'},
    ]
  },
  actions: {
    label: '💫 행동',
    items: [
      {text:'춤을 추는',emoji:'💃'},{text:'웃고 있는',emoji:'😄'},
      {text:'하늘을 나는',emoji:'🕊️'},{text:'뛰어노는',emoji:'🏃'},
      {text:'잠을 자는',emoji:'😴'},{text:'케이크를 먹는',emoji:'🎂'},
    ]
  }
};

const sel = {colors:null,animals:null,bgs:null,actions:null};
const selR = {colors:null,animals:null,bgs:null,actions:null};

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){showScreen('screen-home');}
function goChoose(){buildChooseUI();showScreen('screen-choose');}
function goRandom(){showScreen('screen-random');}

function buildChooseUI(){
  const container=document.getElementById('choose-categories');
  container.innerHTML='';
  Object.entries(data).forEach(([key,{label,items}])=>{
    const row=document.createElement('div');
    row.className='category-row';
    row.innerHTML='<div class="cat-label">'+label+'</div>';
    const chips=document.createElement('div');
    chips.className='chips';
    items.forEach(item=>{chips.appendChild(makeChip(item,key,chips));});
    row.appendChild(chips);
    // 추가 입력
    const addRow=document.createElement('div');
    addRow.className='add-row';
    const inp=document.createElement('input');
    inp.className='add-input';inp.placeholder='새 항목 추가...';
    const empInp=document.createElement('input');
    empInp.className='add-input add-emoji';empInp.placeholder='그림';
    const addBtn=document.createElement('button');
    addBtn.className='btn-add';addBtn.textContent='+ 추가';
    addBtn.onclick=()=>{
      const v=inp.value.trim();const em=empInp.value.trim()||'✨';
      if(!v)return;
      const newItem={text:v,emoji:em};
      data[key].items.push(newItem);
      chips.appendChild(makeChip(newItem,key,chips));
      inp.value='';empInp.value='';
    };
    addRow.appendChild(inp);addRow.appendChild(empInp);addRow.appendChild(addBtn);
    row.appendChild(addRow);
    container.appendChild(row);
  });
}

function makeChip(item,key,chipsEl){
  const c=document.createElement('button');
  c.className='chip';
  if(key==='colors'&&item.hex){
    c.innerHTML='<span style="color:'+item.hex+';font-weight:900">● '+item.text+'</span>';
  } else {
    c.textContent=item.emoji+' '+item.text;
  }
  c.onclick=()=>{
    chipsEl.querySelectorAll('.chip').forEach(ch=>{
      ch.classList.remove('sel-animal','sel-bg','sel-action');
      ch.style.background='';ch.style.borderColor='';ch.style.color='';ch.style.transform='';
    });
    if(key==='colors'&&item.hex){
      c.style.background=item.hex;c.style.borderColor=item.hex;c.style.color='#fff';c.style.transform='scale(1.08)';
    } else if(key==='animals'){c.classList.add('sel-animal');}
    else if(key==='bgs'){c.classList.add('sel-bg');}
    else if(key==='actions'){c.classList.add('sel-action');}
    sel[key]=item;updateChoosePreview();
  };
  return c;
}

function updateChoosePreview(){
  const btn=document.getElementById('choose-confirm');
  if(sel.colors&&sel.animals&&sel.bgs){
    document.getElementById('choose-preview').innerHTML='🗣️ <span>"'+buildPrompt(sel.colors.text,sel.animals.text,sel.bgs.text,sel.actions&&sel.actions.text)+'"</span>';
    btn.disabled=false;
  } else {
    document.getElementById('choose-preview').innerHTML='👆 색깔, 동물, 배경을 하나씩 골라보세요!';
    btn.disabled=true;
  }
}

function getRandItem(key){const arr=data[key].items;return arr[Math.floor(Math.random()*arr.length)];}

function renderSlot(el,key,item){
  if(key==='colors'&&item.hex){
    el.innerHTML='<span class="slot-emoji" style="color:'+item.hex+'">●</span><span style="color:'+item.hex+';font-weight:900">'+item.text+'</span>';
  } else {
    el.innerHTML='<span class="slot-emoji">'+item.emoji+'</span>'+item.text;
  }
}

function doSpin(){
  const btn=document.getElementById('spin-btn');
  const confirmBtn=document.getElementById('random-confirm');
  btn.disabled=true;confirmBtn.disabled=true;const respinBtn2=document.getElementById('respin-btn');if(respinBtn2){respinBtn2.style.display='none';}
  document.getElementById('random-preview').style.display='none';
  const slots=[
    {el:document.getElementById('slot-color'),key:'colors'},
    {el:document.getElementById('slot-animal'),key:'animals'},
    {el:document.getElementById('slot-bg'),key:'bgs'},
    {el:document.getElementById('slot-action'),key:'actions'},
  ];
  slots.forEach(s=>s.el.classList.add('spinning'));
  let count=0;
  const iv=setInterval(()=>{
    slots.forEach(s=>renderSlot(s.el,s.key,getRandItem(s.key)));
    count++;
    if(count>=20){
      clearInterval(iv);
      slots.forEach(s=>{const item=getRandItem(s.key);selR[s.key]=item;renderSlot(s.el,s.key,item);s.el.classList.remove('spinning');});
      const prompt=buildPrompt(selR.colors.text,selR.animals.text,selR.bgs.text,selR.actions&&selR.actions.text);
      const preview=document.getElementById('random-preview');
      preview.innerHTML='🗣️ <span>"'+prompt+'"</span>';
      preview.style.display='';
      btn.disabled=false;confirmBtn.disabled=false;const respinBtn=document.getElementById('respin-btn');respinBtn.style.display='';respinBtn.disabled=false;
      launchConfetti();
    }
  },80);
}

function buildPrompt(color,animal,bg,action){
  return action ? bg+'에서 '+action+' '+color+' '+animal+'을(를) 그려줘' : bg+'에 있는 '+color+' '+animal+'을(를) 그려줘';
}

function goResult(mode){
  const s=mode==='choose'?sel:selR;
  const prompt=buildPrompt(s.colors.text,s.animals.text,s.bgs.text,s.actions&&s.actions.text);
  document.getElementById('result-text').textContent='"'+prompt+'"';
  document.getElementById('result-back-btn').onclick=()=>mode==='choose'?goChoose():goRandom();
  showScreen('screen-result');launchConfetti();
}

function copyPrompt(){
  const text=document.getElementById('result-text').textContent.replace(/"/g,'').trim();
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{ showCopied(); }).catch(()=>{ fallbackCopy(text); });
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';ta.style.top='0';ta.style.left='0';ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  try{ document.execCommand('copy'); showCopied(); }catch(e){ alert('복사 실패: 직접 선택해 복사해주세요'); }
  document.body.removeChild(ta);
}
function showCopied(){
  const btn=document.querySelector('.copy-btn');
  btn.textContent='✅ 복사됐어요!';
  setTimeout(()=>btn.textContent='📋 복사하기',2000);
}

function launchConfetti(){
  const wrap=document.getElementById('confetti-wrap');wrap.innerHTML='';
  const colors=['#FFD93D','#FF6B6B','#6EC6F5','#6BCB77','#C77DFF','#ff9a4d'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration=(1.5+Math.random()*2)+'s';
    p.style.animationDelay=(Math.random()*0.8)+'s';
    p.style.width=p.style.height=(8+Math.random()*10)+'px';
    wrap.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}
</script>
</body>
</html>
